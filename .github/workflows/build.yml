名称: 构建可执行文件
on: [push, workflow_dispatch]

jobs:
build-windows:
    名称: 在 Windows 上构建
    运行于: windows-latest
    步骤:
      - name: Checkout code
        使用: actions/checkout@v4

      - 名称: 设置 Python
        使用: actions/setup-python@v5
        使用:
          python-version: '3.10'

      - 名称: 安装依赖项
        运行: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install netmiko pandas msoffcrypto-tool openpyxl

      - name: 使用 PyInstaller 构建
        运行: |
          python -m PyInstaller --onefile --name "DeviceInspector" devices_inspection.py

      - 名称: 上传制品
        用途: actions/upload-artifact@v4
        使用:
          名称: DeviceInspector-windows
          路径: dist/DeviceInspector.exe
